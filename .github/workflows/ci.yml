name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Test
        # No ANTHROPIC_API_KEY here on purpose: the suite fakes the client, so a
        # green CI run proves the extraction and scoring logic without spending
        # anything or depending on the API being up.
        run: pytest -q
